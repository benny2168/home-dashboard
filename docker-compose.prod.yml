services:
  app:
    image: mtcdtech/home-dashboard:personal
    container_name: homedashboard-app-personal
    command: node server.js
    ports:
      - "4001:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@homedashboard-db-personal:5432/dashboard?schema=public
      - NEXTAUTH_URL=https://home.server.mtcd.org
      - AUTH_URL=https://home.server.mtcd.org
      - AUTH_TRUST_HOST=true
      - AUTH_SECRET=85Fa8SnqPbz5f7PDa8thsn+bGAAO0m/cjW0l6WZSrF4=
    volumes:
      - homedashboard_personal_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: homedashboard-db-personal
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dashboard
    volumes:
      - homedashboard_personal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  homedashboard_personal_db_data:
  homedashboard_personal_uploads:
