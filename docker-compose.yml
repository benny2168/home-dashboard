services:
  app:
    build:
      context: .
      target: development
    ports:
      - "4000:4000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
      - ./.env:/app/.env
      - ./uploads:/app/public/uploads
    command: npm run dev
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://user:password@db:5432/dashboard?schema=public
      - AUTH_TRUST_HOST=true
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dashboard
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
